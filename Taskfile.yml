# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!

tasks:
  default:
    deps: [lint, test]
    silent: true
  lint:
    cmds:
      - golangci-lint run ./... --fix
  test:
    cmds: 
      - go test ./... -v -coverprofile=cover.out
  cov:
    cmds:
    - go tool cover -html=cover.out -o cover.html
    - open cover.html
